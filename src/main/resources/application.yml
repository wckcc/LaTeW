spring:
  # 数据源配置
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://localhost:3306/latew?useUnicode=true&characterEncoding=utf8&useSSL=false&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true
    username: root
    password: 518518
  # 文件上传配置
  servlet:
    multipart:
      enabled: true
      max-file-size: 50MB  # 单个文件最大大小
      max-request-size: 50MB  # 请求最大大小
      file-size-threshold: 2KB  # 文件写入磁盘的阈值

  # Redis 配置
  data:
    redis:
      host: 127.0.0.1
      port: 6379
      password: 518518
      database: 0
  
  # 邮件发送配置
  mail:
    host: smtp.qq.com  # SMTP服务器地址，根据邮件提供商修改
    port: 587  # SMTP服务器端口
    username: 691854351@qq.com  # 发送邮件的邮箱
    password: mkqdyfbhbhwmbcbd  # 邮箱密码或授权码
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true
            required: true
          nickname: LaTeW  # 邮件发送者昵称

# MyBatis配置
mybatis:
  # Mapper XML文件位置
  mapper-locations: classpath:mapper/*.xml
  # 实体类包路径
  type-aliases-package: org.example.entity
  configuration:
    # 开启驼峰命名转换
    map-underscore-to-camel-case: true

# 服务器配置
server:
  port: 8080

# JWT配置
jwt:
  secret: latew-secret-key-2024-very-long-secret-key-for-security
  expiration: 86400000  # 24小时，单位：毫秒

# 头像上传配置
avatar:
  upload:
    path: ./static/avatars  # 头像存储目录
    max-size: 5MB           # 最大文件大小
    allowed-types: image/jpeg,image/png,image/gif,image/webp  # 允许的文件类型

# 项目图片上传配置
image:
  upload:
    path: ./static/images
    allowed-types: image/jpeg,image/png,image/gif,image/webp

# LaTeX编译配置
latex:
  compile:
    temp-dir: ./temp/compile  # 临时编译目录
    output-dir: ./static/pdf  # PDF输出目录
    pdflatex-path: pdflatex   # pdflatex命令路径（如果不在PATH中，请指定完整路径，如：C:/texlive/2024/bin/windows/pdflatex.exe）
    xelatex-path: xelatex     # xelatex命令路径（可改为完整路径）
    lualatex-path: lualatex   # lualatex命令路径（可改为完整路径）
    timeout: 30               # 编译超时时间（秒）

# Word 导出配置（Pandoc）
word:
  export:
    temp-dir: ./temp/word     # 临时导出目录
    output-dir: ./static/word # Word 输出目录
    pandoc-path: pandoc       # pandoc 命令路径（若不在 PATH 中请配置绝对路径）
    timeout: 60               # 导出超时时间（秒）

# 火山引擎 API配置（豆包大模型）
volcengine:
  api:
    url: https://ark.cn-beijing.volces.com/api/v3/chat/completions  # 火山引擎 API地址
    api-key: ${ARK_API_KEY:5d7cb0e2-2484-45ea-ad6a-99c82b6a8eac}  # 火山引擎 API密钥（可通过环境变量ARK_API_KEY设置）
    model: doubao-seed-1-8-251228  # 使用的模型（豆包）
    timeout: 120  # 请求超时时间（秒）

